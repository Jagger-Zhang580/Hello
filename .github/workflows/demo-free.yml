name: 免费CI/CD演示

on:
  workflow_dispatch: # 允许手动运行

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 执行自动化操作
        run: |
          echo "运行时间: $(date)" >> log.txt
          echo "✅ 自动执行成功"

      - name: 自动提交修改
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI自动更新"
